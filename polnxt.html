<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>POLA GACOR ONLINE NXT</title>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
}

.container {
    width: 700px;
    margin: auto;
}

h1 {
    text-align: center;
    color: #d35400;
}

select, input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #d35400;
    color: white;
    border: none;
    cursor: pointer;
}

#hasil {
    margin-top: 20px;
    background: #eee;
    padding: 10px;
    height: 320px;
    overflow-y: scroll;
    white-space: pre-wrap;
}
</style>
</head>

<body>

<div class="container">
<h1>Pola Gacor Online</h1>

<label>Pilih Nama Situs:</label>
<select id="situs">
    <option>GARUDA62</option>
    <option>INDO62</option>
    <option>PETIR62</option>
    <option>MERDEKA62</option>
</select>

<label>Pilih Provider:</label>
<select id="provider" onchange="updateGame()">
    <option value="pgsoft">PGSOFT</option>
    <option value="pragmatic">PRAGMATIC</option>
</select>

<label>Pilih Game Cuy:</label>
<select id="game"></select>

<label>Jumlah Pola yang Di-generate:</label>
<input type="number" id="jumlah" value="1">

<button onclick="generate()">Generate Pola</button>
<button onclick="download()">Download Hasil</button>
<button onclick="copyHasil()">Copy Hasil</button>

<h2>Hasil Pola:</h2>
<div id="hasil"></div>

</div>

<script>

// GAME LIST
const games = {
    pgsoft: ["Mahjong 1","Mahjong 2","Wild Bounty Shadow","Wild Bandito","Lucky Neko"],
    pragmatic: ["Gate Olympus","Gate Olympus 1000","Mahjong 3","Bonanza 1000"]
};

// AUTO SPIN
const autoSpin = [10,30,50,80];

// BET
const betList = [400,600,800,1000,1200,1400,1600];

// UPDATE GAME
function updateGame(){
    let p = document.getElementById("provider").value;
    let g = document.getElementById("game");
    g.innerHTML = "";

    games[p].forEach(x=>{
        let opt = document.createElement("option");
        opt.text = x;
        g.add(opt);
    });
}
updateGame();

// RANDOM
function rand(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

// GENERATE
function generate(){
    let situs = document.getElementById("situs").value;
    let provider = document.getElementById("provider").value;
    let game = document.getElementById("game").value;
    let jumlah = document.getElementById("jumlah").value;

    let hasil = "";

    for(let i=0;i<jumlah;i++){

        let b1 = rand(betList);
        let b2 = rand(betList);
        let b3 = rand(betList);
        let b4 = rand(betList);
        let spin = rand(autoSpin);

        hasil += `Pola Gacor saat ini\n`;
        hasil += `${situs} , senang bisa membantu kaka nya ^^\n\n`;

        hasil += `💯 POLA ${game.toUpperCase()} AUTO GACOR 💯\n\n`;

        hasil += `🎮 ${game} 🎮\n\n`;

        hasil += `🔥 Step 1: Panaskan Mesin\n`;
        hasil += `${Math.floor(Math.random()*15+15)}x Manual Spin (BET ${b1})\n\n`;

        hasil += `⚡ Step 2: Pola Utama\n`;

        if(provider==="pgsoft"){
            hasil += `${spin}x Auto Turbo ON (BET ${b2})\n\n`;
        } else {
            hasil += `${spin}x Auto Spin Turbo ON (BET ${b2})\n\n`;
        }

        hasil += `⛔ Step 3: Kontrol Spin\n`;

        if(provider==="pgsoft"){
            hasil += `${Math.floor(Math.random()*10+5)}x Manual Turbo ON (BET ${b3})\n\n`;
        } else {
            hasil += `${Math.floor(Math.random()*10+5)}x Manual Spin Cepat ON (BET ${b3})\n\n`;
        }

        hasil += `💥 Langkah Terakhir\n`;
        hasil += `${Math.floor(Math.random()*20+10)}x Manual Turbo ON (BET ${b4})\n\n`;

        hasil += `MINIMAL DEPOSIT 50-250 rb BERKESEMPATAN JADI JUTAWAN\n\n`;
        hasil += `Selamat bermain dan semoga mendapatkan kemenangan nya ya kak ^^\n`;
    }

    document.getElementById("hasil").innerText = hasil;
}

// COPY
function copyHasil(){
    let text = document.getElementById("hasil").innerText;
    navigator.clipboard.writeText(text);
    alert("Berhasil di copy!");
}

// DOWNLOAD
function download(){
    let text = document.getElementById("hasil").innerText;
    let blob = new Blob([text], {type:"text/plain"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "hasil_pola.txt";
    a.click();
}

</script>

</body>
</html>
