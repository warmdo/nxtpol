<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Generator Pola Gacor</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.container {
    width: 700px;
    margin: auto;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
    margin-top: 20px;
}

h1 {
    text-align: center;
    color: #f97316;
}

select {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    background: #334155;
    color: white;
    border: none;
    border-radius: 6px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #f97316;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 6px;
}

#hasil {
    margin-top: 20px;
    background: black;
    padding: 15px;
    height: 350px;
    overflow-y: scroll;
    white-space: pre-wrap;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🔥 GENERATOR POLA GACOR NXT🔥</h1>

<div class="card">

<label>Pilih Situs:</label>
<select id="situs">
    <option>GARUDA62</option>
    <option>PETIR62</option>
    <option>INDO62</option>
    <option>MERDEKA62</option>
</select>

<label>Provider:</label>
<select id="provider" onchange="updateGame()">
    <option value="pgsoft">PGSOFT</option>
    <option value="pragmatic">PRAGMATIC</option>
</select>

<label>Game:</label>
<select id="game"></select>

<button onclick="generate()">Generate</button>
<button onclick="copyHasil()">Copy</button>
<button onclick="download()">Download</button>

</div>

<div id="hasil"></div>

</div>

<script>

// GAME
const games = {
    pgsoft: ["Mahjong 1","Mahjong 2","Wild Bandito","Lucky Neko"],
    pragmatic: ["Gate Olympus","Gate Olympus 1000","Sweet Bonanza"]
};

// AUTO SPIN
const autoSpin = [10,30,50,80];

// BET RANGE
const betRange = ["400-800","600-1000","800-1200","1000-1400","1400-2000"];

// LINK PER SITUS (DITAMBAH APK)
const linkSitus = {
    GARUDA62: {
        utama: "https://indocuan.link/G62/alt",
        alternatif: "https://indocuan.link/G62/utama",
        apk: "https://indocuan.link/G62/installapk"
    },
    PETIR62: {
        utama: "https://indocuan.link/P62/utama",
        alternatif: "https://indocuan.link/P62/alt",
        apk: "https://indocuan.link/R62/apkrepublik62"
    },
    INDO62: {
        utama: "",
        alternatif: "",
        apk: ""
    },
    MERDEKA62: {
        utama: "https://indocuan.link/W62/utama",
        alternatif: "https://indocuan.link/W62/alt",
        apk: "https://indocuan.link/W62/apkwarga62"
    }
};

// UPDATE GAME
function updateGame(){
    let p = provider.value;
    game.innerHTML = "";
    games[p].forEach(x=>{
        let o = document.createElement("option");
        o.text = x;
        game.add(o);
    });
}
updateGame();

// RANDOM
function rand(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

// GENERATE (1 POLA SAJA)
function generate(){

    let situs = document.getElementById("situs").value;
    let game = document.getElementById("game").value;

    let spin = rand(autoSpin);
    let fokusBet = rand(betRange);

    let linkUtama = linkSitus[situs].utama;
    let linkAlt = linkSitus[situs].alternatif;
    let linkApk = linkSitus[situs].apk;

    let hasil = "";

    hasil += `Pola Gacor saat ini\n`;
    hasil += `Terimakasih telah menghubungi ${situs} , senang bisa membantu kaka nya ^^\n\n`;

    hasil += `💯 POLA ${game.toUpperCase()} AUTO GACOR 💯\n`;
    hasil += `Fokus di bettingan ${fokusBet}\n\n`;

    hasil += `🎮 ${game} 🎮\n\n`;

    hasil += `🔥 Step 1: Panaskan Mesin\n`;
    hasil += `${Math.floor(Math.random()*10+15)}x Manual Spin\n\n`;

    hasil += `⚡ Step 2: Pola Utama\n`;
    hasil += `${spin}x Auto Turbo ON\n\n`;

    hasil += `⛔ Step 3: Kontrol Spin\n`;
    hasil += `${Math.floor(Math.random()*10+5)}x Manual Turbo ON\n\n`;

    hasil += `💥 Langkah Terakhir\n`;
    hasil += `${Math.floor(Math.random()*20+10)}x Manual Turbo ON\n\n`;

    hasil += `MINIMAL DEPOSIT 50-250 rb BERKESEMPATAN JADI JUTAWAN\n\n`;

    hasil += `Link Utama : ${linkUtama}\n`;
    hasil += `Link Alternatif : ${linkAlt}\n`;
    hasil += `Link APK : ${linkApk}\n\n`;

    hasil += `Selamat bermain dan semoga mendapatkan kemenangan nya ya kak ^^\n`;

    document.getElementById("hasil").innerText = hasil;
}

// COPY
function copyHasil(){
    navigator.clipboard.writeText(hasil.innerText);
    alert("Berhasil di copy!");
}

// DOWNLOAD
function download(){
    let blob = new Blob([hasil.innerText], {type:"text/plain"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "pola_gacor.txt";
    a.click();
}

</script>

</body>
</html>
